site_name: OrgZ Manual
site_url: https://foxcouncil.github.io/OrgZ/
site_description: User manual for OrgZ — the music & radio organizer
site_author: FoxCouncil
repo_url: https://github.com/FoxCouncil/OrgZ
repo_name: FoxCouncil/OrgZ

theme:
  name: material
  palette:
    scheme: slate
    primary: blue grey
    accent: light blue
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - First Launch: getting-started/first-launch.md
  - Features:
    - Music Library: features/music-library.md
    - Ripping CDs: features/ripping-cds.md
    - Radio Stations: features/radio-stations.md
    - Podcasts: features/podcasts.md
    - Favorites: features/favorites.md
    - Playback: features/playback.md
    - Keyboard Shortcuts: features/keyboard-shortcuts.md
  - Devices:
    - iPods & Rockbox: devices/ipod-rockbox.md
    - Playlists & Syncing: devices/syncing.md
  - Settings: settings.md
  - Changelog: changelog.md
  - Credits: credits.md

copyright: >
  Sample cover art © Mandie NRG &amp; DJ Nine, used with permission · Eurobeat metadata
  via <a href="https://eurobeat.online">eurobeat.online</a> (CC BY 4.0)

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/hero.css

extra:
  version:
    provider: mike

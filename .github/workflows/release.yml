name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: dotnet publish OrgZ.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack with Velopack
        run: vpk pack -u OrgZ -v ${{ steps.version.outputs.VERSION }} -p publish -o releases

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: releases/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate release body
        id: body
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"
          cat > body.md << EOF
          ## Download OrgZ v${VERSION}

          | Platform | Installer | Portable |
          |----------|-----------|----------|
          | Windows (x64) | [OrgZ-win-Setup.exe](${BASE}/OrgZ-win-Setup.exe) | [OrgZ-win-Portable.zip](${BASE}/OrgZ-win-Portable.zip) |
          | macOS (Apple Silicon) | [OrgZ-osx-Setup.pkg](${BASE}/OrgZ-osx-Setup.pkg) | [OrgZ-osx-Portable.zip](${BASE}/OrgZ-osx-Portable.zip) |
          | Linux (x64) | [OrgZ.AppImage](${BASE}/OrgZ.AppImage) | - |

          <details><summary>Other files in this release are used by the auto-updater.</summary>

          The \`.nupkg\`, \`.json\`, and \`RELEASES\` files are consumed by OrgZ's built-in update mechanism. You don't need to download them manually.
          </details>
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: body.md
          fail_on_unmatched_files: false

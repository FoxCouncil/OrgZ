name: Deploy Docs Landing

# Versioned docs follow the RELEASE cycle exclusively - the docs job in release.yml publishes
# each version when its tag is cut, and never before. This workflow only maintains the
# unversioned landing page.

on:
  push:
    branches: [main]
    paths:
      - 'docs-landing/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy landing page
        run: |
          cp docs-landing/index.html /tmp/landing.html
          git checkout gh-pages
          cp /tmp/landing.html index.html
          git add index.html
          git diff --cached --quiet || (git commit -m "Update landing page" && git push origin gh-pages)

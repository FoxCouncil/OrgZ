name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-landing/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mkdocs-material mike

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' OrgZ.csproj)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs
        run: |
          mike deploy --push --update-aliases ${{ steps.version.outputs.version }} latest

      - name: Deploy landing page
        run: |
          # Save the landing page from main before switching branches
          cp docs-landing/index.html /tmp/landing.html
          git checkout gh-pages
          cp /tmp/landing.html index.html
          git add index.html
          git diff --cached --quiet || (git commit -m "Update landing page" && git push origin gh-pages)
